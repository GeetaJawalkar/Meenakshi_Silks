<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Meenakshi Silks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Meenakshi Silks</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#products">Collections</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      <a href="admin.html">Owner App</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>

  <section class="cart">
    <h2>Shopping Cart</h2>
    <div id="cart-empty">Your cart is empty.</div>
    <ul id="cart-items"></ul>
    <p class="cart-total">Total: ₹<span id="cart-total">0</span></p>
    <div class="cart-actions">
      <button onclick="clearCart()">Clear Cart</button>
      <button onclick="checkout()">Checkout</button>
    </div>
    <p><a class="continue-shopping" href="index.html#products">Continue Shopping</a></p>
  </section>

  <footer>
    <p>© 2026 Meenakshi Silks</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
